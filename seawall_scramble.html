<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seawall Scramble</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a18; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:monospace; }
#ui { color:#fff; margin-bottom:6px; display:flex; gap:12px; align-items:center; width:640px; }
#ui-left { display:flex; gap:12px; align-items:center; flex:1; }
#ui-right { display:flex; gap:6px; }
canvas { display:block; image-rendering:pixelated; border:3px solid #444; cursor:none; }
#game-wrap { position:relative; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.82); color:#fff; }
#overlay h1 { font-size:32px; color:#7ec8e3; margin-bottom:6px; letter-spacing:2px; text-shadow:2px 2px #0a3d5c; }
#overlay p  { margin:4px 0; font-size:13px; color:#ccc; }
.start-wrap { margin-top:14px; }
.bike-btn   { padding:8px 20px; font-size:14px; font-family:monospace; background:#8a3a2a; color:#fff; border:2px solid #ff8060; cursor:pointer; }
.bike-btn:hover { background:#9a4a3a; }
#score-display  { font-size:16px; color:#ffe066; }
#tod-display    { font-size:12px; color:#aaddff; min-width:80px; }
#info-bar { width:640px; margin-top:5px; color:#88ccaa; font-size:11px; text-align:center; font-family:monospace; letter-spacing:0.5px; display:none; }
.cbtn { padding:4px 10px; font-family:monospace; font-size:12px; cursor:pointer; display:none; }
#btn-pause { background:#1a3244; color:#88ccff; border:1px solid #4488aa; }
#btn-pause:hover { background:#254a62; }
#btn-home  { background:#3a140a; color:#ff9966; border:1px solid #882222; }
#btn-home:hover  { background:#4a241a; }
</style>
</head>
<body>
<div id="ui">
  <div id="ui-left">
    <span id="score-display">Score: 0</span>
    <span id="tod-display">🌅 Dawn</span>
  </div>
  <div id="ui-right">
    <button id="btn-pause" class="cbtn" onclick="togglePause()">⏸ Pause [P]</button>
    <button id="btn-home"  class="cbtn" onclick="goHome()">🏠 Home [Esc]</button>
  </div>
</div>
<div id="game-wrap">
  <canvas id="c" width="640" height="320"></canvas>
  <div id="overlay">
    <h1>Seawall Scramble</h1>
    <p>Navigate the Vancouver Seawall!</p>
    <p>Dodge goose poop 💚 and angry geese 🪿</p>
    <div class="start-wrap">
      <button class="bike-btn" onclick="startGame()">🚴 Play</button>
    </div>
    <p style="margin-top:10px;color:#7ec8e3;font-size:12px">Sky cycles morning → sunset → night → dawn as you play</p>
  </div>
</div>
<div id="info-bar">🐟 = distract &amp; scatter geese &nbsp;&nbsp; 🍁 = 5s invincibility &nbsp;&nbsp; ❤️ = +1 life</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=640, H=320;

// ── helpers ───────────────────────────────────────────────────────────────────
function hexRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function lerpHex(a,b,t){
  const [ar,ag,ab]=hexRgb(a),[br,bg,bb]=hexRgb(b);
  return '#'+[ar+(br-ar)*t,ag+(bg-ag)*t,ab+(bb-ab)*t].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}
function rect(x,y,w,h,c){ if(w<=0||h<=0)return; ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.ceil(w),Math.ceil(h)); }

// ── palette ───────────────────────────────────────────────────────────────────
const C={
  ocean1:'#1a6ea8',ocean2:'#2489c8',ocean3:'#5aaddf',foam:'#cce8f8',
  path:'#d4c9a8',pathEdge:'#b8a87a',grass:'#4a8a3a',grassDark:'#2e6e22',
  tree:'#2d6e22',treeTrunk:'#6b4c2a',
  gooseBlack:'#111111',gooseTan:'#8a6018',gooseWhite:'#f0eed0',gooseChin:'#f8f8f0',gooseBeak:'#d08820',
  poopG:'#1a6a08',poopGL:'#2d9010',
  playerSkin:'#f5cba0',playerHair:'#4a3020',playerShirt:'#3a6abf',playerPants:'#2a2a4a',
  playerBike:'#cc4422',playerHelmet:'#ffe066',
  heartRed:'#e03030',
};

// ── game state ────────────────────────────────────────────────────────────────
let state='menu',score=0,hearts=3,frame=0,gameTime=0;
let powerups=[],thrownSalmon=null,starPower=0,powerupTimer=10;
let keys={},lastTime=0,invincible=0,scrollX=0;
let controlsTimer=0,wasAirborne=false;
let player={},geese=[],poops=[],particles=[],ships=[];
const mode='bike'; // bike-only
let audioCtx=null;
function getAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return audioCtx;}
function playSound(type){
  const ac=getAudio();if(!ac)return;
  const now=ac.currentTime;
  try{
    if(type==='jump'){
      const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(260,now);o.frequency.exponentialRampToValueAtTime(520,now+0.12);
      g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      o.start(now);o.stop(now+0.2);
    }else if(type==='land'){
      const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(90,now);o.frequency.exponentialRampToValueAtTime(45,now+0.08);
      g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.start(now);o.stop(now+0.08);
    }else if(type==='poop'){
      const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(130,now);o.frequency.exponentialRampToValueAtTime(40,now+0.18);
      g.gain.setValueAtTime(0.35,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
      o.start(now);o.stop(now+0.18);
    }else if(type==='goose'){
      const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(320,now);o.frequency.setValueAtTime(210,now+0.09);o.frequency.setValueAtTime(290,now+0.17);
      g.gain.setValueAtTime(0.28,now);g.gain.setValueAtTime(0.28,now+0.22);g.gain.exponentialRampToValueAtTime(0.001,now+0.28);
      o.start(now);o.stop(now+0.28);
    }else if(type==='pickup_salmon'){
      [0,0.08,0.16].forEach((t,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
        o.frequency.setValueAtTime([440,554,659][i],now+t);
        g.gain.setValueAtTime(0.18,now+t);g.gain.exponentialRampToValueAtTime(0.001,now+t+0.12);
        o.start(now+t);o.stop(now+t+0.12);
      });
    }else if(type==='pickup_maple'){
      [0,0.06,0.12,0.18].forEach((t,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
        o.frequency.setValueAtTime([523,659,784,1047][i],now+t);
        g.gain.setValueAtTime(0.18,now+t);g.gain.exponentialRampToValueAtTime(0.001,now+t+0.1);
        o.start(now+t);o.stop(now+t+0.1);
      });
    }else if(type==='pickup_heart'){
      const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(440,now);o.frequency.setValueAtTime(523,now+0.1);o.frequency.setValueAtTime(659,now+0.2);
      g.gain.setValueAtTime(0.22,now);g.gain.setValueAtTime(0.22,now+0.25);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      o.start(now);o.stop(now+0.4);
    }else if(type==='throw_salmon'){
      const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.connect(g);g.connect(ac.destination);
      o.frequency.setValueAtTime(280,now);o.frequency.exponentialRampToValueAtTime(560,now+0.12);
      g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.start(now);o.stop(now+0.12);
    }
  }catch(e){}
}
const SPEED_WALK=110,SPEED_BIKE=200;
const BASE_FWD_WALK=90,BASE_FWD_BIKE=160; // auto-forward scroll speed
const PATH_TOP=185,PATH_BOT=260;

// ── sky / time-of-day ─────────────────────────────────────────────────────────
// Cycle every 240s: morning → sunset → night → dawn → (repeat)
function getSky(){
  const CYCLE=240;
  const ct=gameTime%CYCLE;
  let ph,pt;
  if(ct<80)       {ph='morning'; pt=ct/80;}
  else if(ct<150) {ph='sunset';  pt=(ct-80)/70;}
  else if(ct<210) {ph='night';   pt=(ct-150)/60;}
  else            {ph='dawn';    pt=(ct-210)/30;}
  const tops={morning:['#4a90cc','#5ab0ee'],sunset:['#5ab0ee','#cc3322'],night:['#cc3322','#06081c'],dawn:['#06081c','#4a90cc']};
  const bots={morning:['#87ceeb','#c8f0ff'],sunset:['#c8f0ff','#ff6622'],night:['#ff6622','#0c1030'],dawn:['#0c1030','#87ceeb']};
  const [ta,tb]=tops[ph],[ba,bb]=bots[ph];
  const nightT=ph==='night'?pt:(ph==='dawn'?1-pt:(ph==='sunset'?pt*0.15:0));
  const sunsetT=ph==='sunset'?pt:(ph==='night'&&pt<0.4?1-pt/0.4:0);
  const labels={morning:'🌤 Morning',sunset:'🌇 Sunset',night:'🌙 Night',dawn:'🌅 Dawn'};
  return {top:lerpHex(ta,tb,pt),bot:lerpHex(ba,bb,pt),nightT,sunsetT,label:labels[ph],phase:ph};
}

// ── seeded RNG ────────────────────────────────────────────────────────────────
function seededRand(seed){let s=seed; return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

// ── stars ─────────────────────────────────────────────────────────────────────
const starRng=seededRand(7331);
const STARS=Array.from({length:70},()=>({x:Math.floor(starRng()*W),y:Math.floor(starRng()*115),r:starRng()<0.75?1:2,tw:Math.floor(starRng()*60)}));

// ── mountains ────────────────────────────────────────────────────────────────
function drawMountains(camX,sky){
  const off=-(camX*0.04)%W;
  const mC=lerpHex('#4a5e70','#1c2838',sky.nightT);
  const sC=sky.nightT>0.6?'#8899aa':(sky.nightT>0.2?'#b8c8d8':'#d8e8f0');
  for(let rep=0;rep<2;rep++){
    const bx=off+rep*W;
    const pts=[bx-20,130,bx+20,78,bx+55,92,bx+85,52,bx+115,68,bx+155,38,bx+195,60,bx+235,42,bx+275,72,bx+315,48,bx+355,65,bx+395,36,bx+435,58,bx+475,48,bx+515,72,bx+555,44,bx+595,68,bx+635,52,bx+655,130];
    // Mountain body
    ctx.fillStyle=mC;
    ctx.beginPath();
    ctx.moveTo(pts[0],pts[1]);
    for(let i=2;i<pts.length;i+=2) ctx.lineTo(pts[i],pts[i+1]);
    ctx.lineTo(bx+660,H);ctx.lineTo(bx-20,H);ctx.closePath();ctx.fill();
  }
}

// ── landmark: Canada Place ────────────────────────────────────────────────────
function drawCanadaPlace(bx,sky){
  const n=sky.nightT;
  const bC=lerpHex('#7a8ea0','#334455',n);
  const sC=lerpHex('#f4f8ff','#99bbcc',n);
  rect(bx,122,92,42,bC);
  for(let wx=0;wx<7;wx++) for(let wy=0;wy<2;wy++) rect(bx+5+wx*12,127+wy*14,9,10,n>0.25?'#ffe090':'#556677');
  ctx.fillStyle=sC;
  [[8,20],[23,10],[42,5],[61,10],[76,20]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.moveTo(bx+sx-11,122);ctx.lineTo(bx+sx,sy+68);ctx.lineTo(bx+sx+11,122);ctx.closePath();ctx.fill();
  });
  rect(bx+44,73,2,51,'#cccccc');
  rect(bx+46,75,13,8,n>0.4?'#cc1111':'#ff0000');
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='7px monospace';ctx.fillText('Canada Place',bx,168);
}

// ── landmark: Vancouver Lookout / Harbour Centre ──────────────────────────────
function drawLookout(bx,sky){
  const n=sky.nightT;
  const tC=lerpHex('#778899','#334455',n);
  const dC=lerpHex('#99aaaa','#445566',n);
  const gC=lerpHex('#aaccee','#334466',n);
  rect(bx+14,82,8,80,tC);
  rect(bx,74,36,14,dC);
  rect(bx+2,68,32,8,dC);
  rect(bx+5,63,26,7,gC);
  if(n>0.2) for(let i=0;i<6;i++) rect(bx+3+i*5,70,4,5,'#ffe080');
  rect(bx+17,59,2,16,'#aaaaaa');
  rect(bx+15,56,6,5,'#cccccc');
  rect(bx+9,160,18,2,tC);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='7px monospace';ctx.fillText('Lookout',bx+2,172);
}

// ── landmark: Gastown Steam Clock ─────────────────────────────────────────────
function drawSteamClock(bx,sky,fr){
  const n=sky.nightT;
  const mC=lerpHex('#998877','#556655',n);
  const gC=lerpHex('#aaccee','#334466',n);
  rect(bx+4,142,10,20,mC);
  rect(bx+2,130,14,13,mC);
  rect(bx+4,132,10,9,gC);
  // hands
  const ang=(fr*0.025)%(Math.PI*2);
  ctx.strokeStyle=n>0.3?'#ffe080':'#222222';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx+9,136.5);ctx.lineTo(bx+9+Math.cos(ang-Math.PI/2)*4,136.5+Math.sin(ang-Math.PI/2)*3.5);ctx.stroke();
  rect(bx+5,127,8,5,mC);
  // steam
  const sw=Math.floor(fr/8)%3;
  const steamY=[121,119,122][sw];
  ctx.fillStyle='rgba(255,255,255,0.55)';
  rect(bx+5,steamY,2,6,'rgba(220,220,255,0.5)');
  rect(bx+9,steamY-2,2,8,'rgba(220,220,255,0.4)');
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='7px monospace';ctx.fillText('Gastown',bx-2,168);
}

// ── landmark: Burrard Bridge ──────────────────────────────────────────────────
function drawBurrardBridge(bx,sky){
  const n=sky.nightT;
  const tC=lerpHex('#887777','#445555',n);
  const cC=lerpHex('#aaaaaa','#667788',n);
  const dC=lerpHex('#999988','#556666',n);
  rect(bx,148,80,5,dC);
  rect(bx+16,112,6,40,tC);rect(bx+58,112,6,40,tC);
  rect(bx+14,108,10,6,tC);rect(bx+56,108,10,6,tC);
  ctx.strokeStyle=cC;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx+19,114);ctx.quadraticCurveTo(bx+40,145,bx+61,114);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,150);ctx.lineTo(bx+19,114);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+80,150);ctx.lineTo(bx+61,114);ctx.stroke();
  if(n>0.3){rect(bx+17,109,4,3,'#ff4400');rect(bx+59,109,4,3,'#ff4400');}
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='7px monospace';ctx.fillText('Burrard Bridge',bx,168);
}

// ── ship / boat sprites ───────────────────────────────────────────────────────
function drawShip(x,y,type,sky){
  const n=sky.nightT;
  if(type==='sailboat'){
    const hullC=lerpHex('#7a5c3a','#2a1a0a',n);
    const sailC=lerpHex('#f0ece0','#8899aa',n);
    const mastC=lerpHex('#886644','#443322',n);
    rect(x+1,y,18,4,hullC);
    rect(x+3,y-2,14,3,lerpHex('#5a3c1a','#1a0a00',n));
    rect(x+9,y-14,1,13,mastC);
    ctx.fillStyle=sailC;
    ctx.beginPath();ctx.moveTo(x+9,y-13);ctx.lineTo(x+10,y-2);ctx.lineTo(x+20,y-6);ctx.closePath();ctx.fill();
    rect(x+9,y-16,4,2,lerpHex('#cc3333','#661111',n));
  }else{
    const hullC=lerpHex('#4a6070','#1a2a38',n);
    const deckC=lerpHex('#8899aa','#334455',n);
    const winC=n>0.3?'#ffe090':'#778899';
    rect(x,y,38,5,hullC);
    rect(x+1,y-6,36,7,deckC);
    for(let i=0;i<4;i++) rect(x+4+i*8,y-5,5,4,winC);
    rect(x+15,y-12,5,7,lerpHex('#556677','#223344',n));
    rect(x+14,y-13,7,2,lerpHex('#777777','#444444',n));
  }
}

// ── background pedestrians / dogs ─────────────────────────────────────────────
function drawBackgroundPerson(x,y,fr,sky){
  const n=sky.nightT;
  const skinC=lerpHex('#f0c090','#806040',n);
  const shirtPalette=['#4488cc','#cc5544','#44aa44','#ccaa44'];
  const sc=lerpHex(shirtPalette[Math.abs(Math.floor(x*0.03))%4],'#223344',n);
  const pc=lerpHex('#334488','#112244',n);
  const step=Math.floor(fr/12)%2;
  rect(x+2,y-12,4,4,skinC);
  rect(x+1,y-8,5,5,sc);
  rect(x+(step?0:6),y-7,1,3,skinC);
  rect(x+1,y-3,2,4,pc);
  rect(x+3+(step?1:0),y-3+(step?1:0),2,4,pc);
}
function drawDog(x,y,fr,sky){
  // Pixel art dog (corgi/shiba style), facing right, wagging tail
  const n=sky.nightT;
  const s=2;
  const tan=lerpHex('#c08838','#6a4818',n);
  const drk=lerpHex('#7a3a14','#3a1c08',n);
  const lgt=lerpHex('#dca84a','#8a6030',n);
  const blk=lerpHex('#180800','#080400',n);
  const wag=Math.floor(fr/7)%2;
  const step=Math.floor(fr/10)%2;
  // Wagging tail (back = left)
  if(wag){
    rect(x+s,y-s*5,s,s*3,tan);  // tail up
    rect(x,y-s*6,s,s,tan);       // tail tip curled
  } else {
    rect(x,y-s*3,s*2,s,tan);     // tail angled out
    rect(x+s,y-s*4,s,s,tan);
  }
  // Body
  rect(x+s*2,y-s*4,s*5,s*4,tan);
  rect(x+s*3,y-s*4,s*3,s,lgt);  // top highlight
  // Neck
  rect(x+s*6,y-s*5,s*2,s*2,tan);
  // Head
  rect(x+s*7,y-s*6,s*3,s*5,tan);
  rect(x+s*8,y-s*6,s,s,lgt);    // head highlight
  // Ears (two, pointed up)
  rect(x+s*7,y-s*8,s,s*3,drk);  // back ear
  rect(x+s*9,y-s*7,s,s*2,drk);  // front ear tip
  // Snout
  rect(x+s*9,y-s*3,s*2,s,tan);
  rect(x+s*10,y-s*2,s,s,drk);   // nose
  // Eye
  rect(x+s*8,y-s*5,s,s,blk);
  // Legs (alternating for walk animation)
  rect(x+s*2+(step?s:0),y,s,s*2,drk);      // back leg A
  rect(x+s*4+(step?0:s),y,s,s*2,tan);      // back leg B
  rect(x+s*6+(step?0:s),y,s,s*2,drk);      // front leg A
  rect(x+s*7+(step?s:0),y,s,s*2,tan);      // front leg B
}

// ── landmark: BC Place ────────────────────────────────────────────────────────
function drawBCPlace(bx,sky){
  const n=sky.nightT;
  const wC=lerpHex('#aabbcc','#334455',n);
  const dC=lerpHex('#c0d0e0','#445566',n);
  rect(bx,135,72,28,wC);
  ctx.fillStyle=dC;
  ctx.beginPath();ctx.ellipse(bx+36,135,36,18,0,Math.PI,0,false);ctx.fill();
  ctx.fillStyle=lerpHex('#d8eeff','#334466',n);
  ctx.beginPath();ctx.ellipse(bx+30,133,18,9,-0.15,Math.PI,0,false);ctx.fill();
  for(let wi=0;wi<6;wi++) rect(bx+5+wi*11,141,8,11,n>0.25?'#ffe090':'#667788');
  rect(bx+34,116,4,21,'#aaaaaa');
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='7px monospace';ctx.fillText('BC Place',bx+10,170);
}

// ── landmark: Capilano-style suspension bridge ────────────────────────────────
function drawCapilano(bx,sky){
  const n=sky.nightT;
  const wC=lerpHex('#7a5c3a','#3a2a1a',n);
  const cC=lerpHex('#ccbbaa','#776655',n);
  rect(bx,138,5,24,wC);rect(bx+55,138,5,24,wC);
  ctx.strokeStyle=cC;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bx+2,138);ctx.quadraticCurveTo(bx+30,156,bx+57,138);ctx.stroke();
  ctx.lineWidth=1;
  for(let i=0;i<10;i++){
    const px2=bx+4+i*5.5,arch=Math.sin(i/9*Math.PI)*8;
    rect(px2,150+arch,5,3,wC);
    ctx.strokeStyle=cC;ctx.beginPath();ctx.moveTo(px2+2,150+arch);ctx.lineTo(px2+2,144+arch*0.5);ctx.stroke();
  }

// ── draw scene ────────────────────────────────────────────────────────────────
function drawScene(camX){
  const sky=getSky();

  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,165);
  grad.addColorStop(0,sky.top);
  grad.addColorStop(1,sky.bot);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,165);

  // Stars (night only)
  if(sky.nightT>0.1){
    const alpha=sky.nightT;
    STARS.forEach(s=>{
      const twinkle=0.6+0.4*Math.sin((frame+s.tw)*0.12);
      ctx.globalAlpha=alpha*twinkle;
      rect(s.x,s.y,s.r,s.r,'#ffffee');
    });
    ctx.globalAlpha=1;
  }

  // Sunset sun / dawn glow
  if(sky.sunsetT>0||sky.phase==='dawn'){
    const sunAlpha=sky.phase==='dawn'?Math.min(1,gameTime/15)*0.8:sky.sunsetT*0.9;
    const sunX=sky.phase==='sunset'?W*0.82:W*0.15;
    const sunY=145-sky.sunsetT*30;
    ctx.globalAlpha=sunAlpha;
    ctx.fillStyle=sky.phase==='sunset'?'#ff7700':'#ffaa44';
    ctx.beginPath();ctx.arc(sunX,sunY,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=sky.phase==='sunset'?'#ff990022':'#ffcc6622';
    ctx.beginPath();ctx.arc(sunX,sunY,22,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Mountains
  drawMountains(camX,sky);

  // Buildings
  const bPar=camX*0.3;
  BUILDINGS.forEach(b=>{
    let bsx=b.x-(bPar%BLDG_TOTAL);
    while(bsx>W) bsx-=BLDG_TOTAL;
    while(bsx<-b.w) bsx+=BLDG_TOTAL;
    if(bsx>W||bsx+b.w<0) return;
    const by=160-b.h;
    const darkC=lerpHex(b.color,'#223344',sky.nightT);
    rect(bsx,by,b.w,b.h,darkC);
    b.wins.forEach(win=>{
      const isLit=sky.nightT>0.4?win.nightOn:win.on;
      rect(bsx+4+win.c*10,by+4+win.r*12,6,7,isLit?'#ffe090':'#445566');
    });
    rect(bsx,by,b.w,2,'#556677');
  });

  // Landmarks (parallax 0.18)
  const lPar=camX*0.18;
  LANDMARKS.forEach(lm=>{
    const sx=lm.x-lPar;
    if(sx>W+140||sx<-140) return;
    lm.fn(sx,sky,frame);
  });

  // Night overlay on background
  if(sky.nightT>0){
    ctx.fillStyle=`rgba(5,8,28,${sky.nightT*0.55})`;
    ctx.fillRect(0,0,W,168);
  }

  // Ocean
  const oceanDark=lerpHex(C.ocean1,'#0a1a2e',sky.nightT);
  const oceanMid=lerpHex(C.ocean2,'#0f2a44',sky.nightT);
  const oceanLight=lerpHex(C.ocean3,'#1a3a55',sky.nightT);
  rect(0,160,W,25,oceanDark);
  for(let wx=0;wx<W;wx+=20){
    const woff=Math.floor((frame+wx*0.5)/8)%2;
    rect(wx+woff,162,14,3,oceanMid);
    rect(wx+4+woff,165,8,2,oceanLight);
  }
  rect(0,183,W,2,lerpHex(C.foam,'#445566',sky.nightT));

  // Ships in ocean
  ships.forEach(s=>{if(s.x>-50&&s.x<W+50) drawShip(s.x,s.y,s.type,sky);});

  // Path
  const pathC=lerpHex(C.path,'#9a9080',sky.nightT);
  const pathEdC=lerpHex(C.pathEdge,'#7a6858',sky.nightT);
  rect(0,PATH_TOP,W,PATH_BOT-PATH_TOP,pathC);
  for(let tx=0;tx<W;tx+=32){
    const toff=(tx+Math.floor(camX))%32;
    rect(tx-toff%32,PATH_TOP+8,1,12,pathEdC);
  }
  rect(0,PATH_TOP,W,3,pathEdC);
  rect(0,PATH_BOT-3,W,3,pathEdC);

  // Grass
  const grassC=lerpHex(C.grass,'#1a3a12',sky.nightT);
  const grassDC=lerpHex(C.grassDark,'#0e2a0a',sky.nightT);
  rect(0,PATH_BOT,W,H-PATH_BOT,grassC);
  for(let gx=0;gx<W;gx+=8){rect(gx,PATH_BOT,4,3,grassDC);rect(gx+4,PATH_BOT+4,3,2,grassDC);}
  rect(0,PATH_TOP-16,W,16,grassC);
  for(let gx=0;gx<W;gx+=8) rect(gx+2,PATH_TOP-14,3,4,grassDC);

  // Trees
  const treePar=camX*0.7;
  TREES.forEach(t=>{
    let tx=t.x-(treePar%4000);
    while(tx>W+32) tx-=4000;
    while(tx<-64) tx+=4000;
    if(tx>W+40||tx<-64) return;
    const ty=PATH_TOP-t.h;
    const trunkC=lerpHex(C.treeTrunk,'#3a2a10',sky.nightT);
    const treeC=lerpHex(C.tree,'#0e2a0a',sky.nightT);
    rect(tx+t.w/2-2,ty+t.h*0.55,4,t.h*0.45,trunkC);
    rect(tx+2,ty+t.h*0.3,t.w-4,t.h*0.5,treeC);
    rect(tx,ty+t.h*0.1,t.w,t.h*0.4,treeC);
    rect(tx+4,ty,t.w-8,t.h*0.25,lerpHex('#3a8028','#0a1e08',sky.nightT));
  });

  // Background pedestrians and dogs in lower grass
  PEDESTRIANS.forEach(p=>{
    if(p.type!=='dog') return;
    let px=p.x-(treePar%4000);
    while(px>W+20) px-=4000;
    while(px<-30) px+=4000;
    if(px>W+20||px<-30) return;
    const py=PATH_BOT+10+p.yOff;
    if(py>H-4) return;
    drawDog(px,py,frame+p.frameOff,sky);
  });

  // Seawall railing
  rect(0,PATH_TOP-4,W,2,'#c0b89a');
  for(let rx=0;rx<W;rx+=16) rect(rx,PATH_TOP-10,2,10,'#b0a888');
}

// Canada Goose: black head+neck, white chin strap, brown/tan body, cream belly, black tail
// B=black, T=tan/brown, W=cream belly, C=white chin strap, Y=orange feet/beak
const GOOSE_R=[
  '..........BBBBB.',  // r0  black head
  '.........BBBBBBB',  // r1  head + neck
  '........BBCCCBBB',  // r2  neck + white chin strap
  '.......BBTCCCBYY',  // r3  body start + chin + beak
  '......BTTTTTTBB.',  // r4  brown body
  '.....BTTTTTTTTBB',  // r5  body
  '....BTTTTTTTTTWB',  // r6  body + cream belly
  '...BBTTTTTTWWWBB',  // r7  lower body + belly
  '....BBBBBBBBBBB.',  // r8  black tail
  '.....BBBBB......',  // r9  tail tip
  '.....T....T.....',  // r10 tan legs
  '....YY....YY....',  // r11 feet
];
function drawGoose(x,y,facingLeft,angry,gframe){
  const s=2;
  const bY=angry?'#ff4400':C.gooseBeak;
  const map={B:C.gooseBlack,T:C.gooseTan,W:C.gooseWhite,C:C.gooseChin,Y:bY};
  const wOff=(Math.floor(gframe/8)%2===0)?0:1;
  GOOSE_R.forEach((row,dy)=>[...row].forEach((ch,dx)=>{
    if(ch==='.') return;
    let col=map[ch]||'#ff00ff';
    if(dy===11&&ch==='Y') col=wOff?C.gooseBeak:'#a06010';
    const fdx=facingLeft?(15-dx):dx;
    rect(x+fdx*s,y+dy*s,s,s,col);
  }));
  if(angry){
    // eyebrows above head: head is at cols 10-14 when facing right, mirrored when facing left
    const ex=facingLeft?s:10*s;
    rect(x+ex,y+s,s*4,s,'#ff2200');
  }
}

function drawWalker(x,y,wf){
  const s=2,p=(dx,dy,c)=>rect(x+dx*s,y+dy*s,s,s,c);

  [4,5,6].forEach(ry=>[2,3,4,5].forEach(rx=>p(rx,ry,C.playerShirt)));
  p(1,4,C.playerSkin);p(6,4,C.playerSkin);

// ── update ────────────────────────────────────────────────────────────────────
function update(dt){
  if(state==='controls'){
    controlsTimer-=dt;
    if(controlsTimer<=0) state='playing';
    return;
  }
  if(state!=='playing') return;
  frame++;
  gameTime+=dt;
  score+=dt*20;

  const diff=getDiff();

  // ── auto-forward scroll ──────────────────────────────────────────────────
  const fwdSpd=BASE_FWD_BIKE*(1+diff*0.2);
  scrollX+=fwdSpd*dt;

  // ── player lateral / vertical dodge ──────────────────────────────────────
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy=1;

  const nx=player.x+dx*SPEED_BIKE*dt;
  player.x=Math.max(20,Math.min(W-40,nx));
  const ny=player.y+dy*SPEED_BIKE*0.6*dt;
  if(ny>=PATH_TOP&&ny+player.h<=PATH_BOT+4) player.y=ny;
  player.walkFrame++;
  if(dx!==0) player.facing=dx;

  // ── jump physics ──────────────────────────────────────────────────────────
  const wasUp=wasAirborne;
  wasAirborne=player.jumpZ>1;
  if(player.jumpZ>0||player.jumpVZ!==0){
    player.jumpVZ+=380*dt;
    player.jumpZ-=player.jumpVZ*dt;
    if(player.jumpZ<=0){player.jumpZ=0;player.jumpVZ=0;if(wasUp)playSound('land');}
  }
  if(invincible>0) invincible-=dt;

  // ── star power (maple leaf) ──────────────────────────────────────────────
  if(starPower>0) starPower-=dt;

  // ── geese ─────────────────────────────────────────────────────────────────
  const chaseDist=80+diff*40;
  const ATK=22;
  const salmonActive=thrownSalmon!==null;
  const salmonSX=salmonActive?thrownSalmon.worldX-scrollX:0;
  geese.forEach(g=>{
    g.walkFrame++;g.attackCooldown-=dt;
    const gsx=g.x-scrollX;
    if(salmonActive){
      g.state='chase';
      const cs=80+diff*40;
      const ang=Math.atan2(thrownSalmon.y-g.y,salmonSX-gsx);
      g.x+=Math.cos(ang)*cs*dt;g.y+=Math.sin(ang)*cs*dt;
      g.facing=salmonSX>gsx?1:-1;
    } else {
      const dist=Math.hypot(gsx-player.x,g.y-player.y);
      if(dist<chaseDist) g.state='chase';
      else if(dist>chaseDist*1.8) g.state='wander';
      if(g.state==='chase'){
        const cs=60+diff*40;
        const ang=Math.atan2(player.y-g.y,player.x-gsx);
        g.x+=Math.cos(ang)*cs*dt;g.y+=Math.sin(ang)*cs*dt;
        g.facing=player.x>gsx?1:-1;
        const playerJumpClear=player.jumpZ>18;
        if(dist<ATK&&g.attackCooldown<=0&&invincible<=0&&starPower<=0&&!playerJumpClear){
          playSound('goose');loseHeart(gsx,g.y);g.attackCooldown=1.5;
          spawnParticles(player.x,player.y+8,'#ff4444',10);
        }
      } else {
        g.wanderTimer-=dt;
        if(g.wanderTimer<0){g.wanderTimer=1.5+Math.random()*2;g.wanderDx=(Math.random()-0.5)*80;g.wanderDy=(Math.random()-0.5)*50;}
        g.x+=g.wanderDx*dt;g.y+=g.wanderDy*dt;
        g.facing=g.wanderDx>0?1:-1;
        g.y=Math.max(PATH_TOP+4,Math.min(PATH_BOT-20,g.y));
      }
    }
  });
  const gooseRate=0.06+diff*0.18;
  const gooseMax=Math.round(2+diff*4);
  if(Math.random()<dt*gooseRate&&geese.length<gooseMax) spawnGoose();
  if(geese.length<Math.max(1,Math.floor(diff+1))&&Math.random()<dt*4) spawnGoose();
  geese=geese.filter(g=>{const s=g.x-scrollX;return s>-200&&s<W+400;});

  // ── poops ─────────────────────────────────────────────────────────────────
  poops.forEach(p=>{
    const psx=p.x-scrollX;
    const jumpClear=player.jumpZ>14;
    if(invincible<=0&&starPower<=0&&!jumpClear&&psx+p.w>player.x&&psx<player.x+player.w&&p.y+p.h>player.y+8&&p.y<player.y+player.h){
      playSound('poop');loseHeart(psx,p.y);spawnParticles(psx,p.y,C.poopG,6);p.stepped=true;
    }
  });
  poops=poops.filter(p=>!p.stepped);
  const poopRate=0.15+diff*0.35;
  const poopMax=Math.round(8+diff*10);
  if(Math.random()<dt*poopRate&&poops.length<poopMax) spawnPoop();
  if(poops.filter(p=>p.x-scrollX<W+300).length<3&&Math.random()<dt*3) spawnPoop();
  poops=poops.filter(p=>p.x-scrollX>-100);

  // ── power-ups ─────────────────────────────────────────────────────────────
  powerups.forEach(pu=>{
    pu.bob+=dt*3;
    const psx=pu.x-scrollX;
    if(psx+16>player.x&&psx<player.x+player.w&&pu.y+18>player.y&&pu.y<player.y+player.h){
      if(pu.type==='salmon'&&!player.hasSalmon){
        player.hasSalmon=true;pu.collected=true;
        playSound('pickup_salmon');
        spawnParticles(psx,pu.y,'#66bbdd',8);
      } else if(pu.type==='maple'){
        starPower=5.0;pu.collected=true;
        playSound('pickup_maple');
        spawnParticles(psx,pu.y,'#cc2020',10);
      } else if(pu.type==='heart'&&hearts<3){
        hearts=Math.min(3,hearts+1);pu.collected=true;
        playSound('pickup_heart');
        spawnParticles(psx,pu.y,C.heartRed,8);
      }
    }
  });
  powerups=powerups.filter(pu=>!pu.collected&&pu.x-scrollX>-60);
  powerupTimer-=dt;
  if(powerupTimer<=0&&powerups.length<4){spawnPowerup();powerupTimer=10+Math.random()*12;}

  // ── thrown salmon ─────────────────────────────────────────────────────────
  if(thrownSalmon){
    thrownSalmon.worldX+=350*dt;
    thrownSalmon.timer-=dt;
    const tsx=thrownSalmon.worldX-scrollX;
    // Destroy poops the salmon flies through
    poops=poops.filter(p=>{
      const psx=p.x-scrollX;
      if(Math.abs(psx+6-tsx)<24&&Math.abs(p.y+5-thrownSalmon.y)<20){
        spawnParticles(psx,p.y,'#88ccff',5);return false;
      }
      return true;
    });
    // Scare geese the salmon hits — knock them away
    geese.forEach(g=>{
      const gsx=g.x-scrollX;
      if(Math.abs(gsx-tsx)<28&&Math.abs(g.y-thrownSalmon.y)<24){
        g.state='wander';
        g.wanderDx=120+Math.random()*80;  // flee right (away from player)
        g.wanderDy=(Math.random()-0.5)*50;
        g.wanderTimer=4+Math.random()*2;
        g.attackCooldown=5;
        spawnParticles(gsx,g.y,'#ffcc44',7);
      }
    });
    if(thrownSalmon.timer<=0||tsx>W+120) thrownSalmon=null;
  }

  // ── ships ─────────────────────────────────────────────────────────────────
  ships.forEach(s=>{s.x-=s.speed*dt;});
  ships=ships.filter(s=>s.x>-60);
  if(ships.filter(s=>s.x<W+100).length<2&&Math.random()<dt*0.4) spawnShip(true);

  // ── particles ─────────────────────────────────────────────────────────────
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.life-=dt*1.5;});
  particles=particles.filter(p=>p.life>0);

  updateDOM();
}

function loseHeart(hx,hy){
  hearts--;invincible=2.0;
  spawnParticles(hx||player.x,hy||player.y,C.heartRed,8);
  if(hearts<=0) endGame();
}

function updateDOM(){
  document.getElementById('score-display').textContent=`Score: ${Math.floor(score)}`;
  document.getElementById('tod-display').textContent=getSky().label;
}

// ── render ────────────────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  drawScene(scrollX);

  // Poops
  poops.forEach(p=>{const sx=p.x-scrollX;if(sx>-20&&sx<W+20) drawPoop(sx,p.y);});

  // Power-ups on path (glow behind, then sprite on top)
  powerups.forEach(pu=>{
    const psx=pu.x-scrollX;
    if(psx<-20||psx>W+20) return;
    const bob=Math.sin(pu.bob)*3;
    const glowC=pu.type==='salmon'?'#4499bb':pu.type==='maple'?'#cc2020':'#e03030';
    ctx.globalAlpha=0.25+0.15*Math.sin(pu.bob*1.5);
    ctx.beginPath();ctx.arc(psx+8,pu.y+8+bob,13,0,Math.PI*2);ctx.fillStyle=glowC;ctx.fill();
    ctx.globalAlpha=1;
    if(pu.type==='salmon') drawSalmonItem(psx,pu.y+bob);
    else if(pu.type==='maple') drawMapleLeaf(psx,pu.y+bob);
    else if(pu.type==='heart') drawHeartItem(psx,pu.y+bob);
  });

  // Thrown salmon
  if(thrownSalmon){
    const tsx=thrownSalmon.worldX-scrollX;
    if(tsx>-20&&tsx<W+20) drawSalmonItem(tsx,thrownSalmon.y+Math.sin(frame*0.3)*2);
  }

  // Geese
  geese.forEach(g=>{
    const gsx=g.x-scrollX;
    if(gsx<-40||gsx>W+40) return;
    const angry=g.state==='chase';
    drawGoose(gsx-16,g.y-12,g.facing<0,angry,g.walkFrame);
    if(angry){ctx.fillStyle='#ff2200';ctx.font='bold 12px monospace';ctx.fillText('!',gsx-2,g.y-16);}
  });

  // Player shadow when airborne
  if(player.jumpZ>2){
    const shadowW=Math.max(6,18-player.jumpZ*0.3);
    ctx.globalAlpha=Math.max(0.1,0.45-player.jumpZ*0.01);
    ctx.fillStyle='#000000';
    ctx.beginPath();ctx.ellipse(player.x,player.y+player.h-2,shadowW,4,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Player (flash when invincible or star-powered)
  const starFlash=starPower>0&&Math.floor(frame/3)%2===0;
  const invFlash=starPower<=0&&invincible>0&&Math.floor(frame/4)%2===1;
  if(!invFlash){
    const ry=player.y-player.jumpZ;
    drawCyclist(player.x-8,ry-4,player.walkFrame);
    if(starFlash){
      ctx.globalCompositeOperation='screen';
      ctx.globalAlpha=0.35+0.15*Math.sin(frame*0.4);
      rect(player.x-10,ry-6,24,30,'#ffdd00');
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=1;
    }
  }

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);rect(p.x-p.size/2,p.y-p.size/2,p.size,p.size,p.color);});
  ctx.globalAlpha=1;

  drawHUD();

  if(state==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#7ec8e3';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.fillStyle='#ccc';ctx.font='14px monospace';
    ctx.fillText('P / Space = resume  •  Esc = home',W/2,H/2+18);
    ctx.textAlign='left';
  }

  if(state==='controls'){
    const fade=Math.min(1,controlsTimer>1?1:(1-controlsTimer));
    ctx.fillStyle=`rgba(0,0,0,${0.88*(1-fade*0.3)})`;ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#7ec8e3';ctx.font='bold 20px monospace';
    ctx.fillText('CONTROLS',W/2,H/2-48);
    ctx.fillStyle='#ffffff';ctx.font='15px monospace';
    ctx.fillText('↑  ↓  ←  →  /  W  A  S  D  =  dodge',W/2,H/2-18);
    ctx.fillText('Space  =  jump  /  throw 🐟 salmon',W/2,H/2+10);
    ctx.fillStyle='#aaddff';ctx.font='13px monospace';
    ctx.fillText('Get ready…',W/2,H/2+38);
    ctx.textAlign='left';
  }
}

// ── game loop ─────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;update(dt);render();requestAnimationFrame(loop);
}

// ── game flow ─────────────────────────────────────────────────────────────────
function showGameBtns(visible){
  ['btn-pause','btn-home'].forEach(id=>document.getElementById(id).style.display=visible?'inline-block':'none');
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('info-bar').style.display='block';
  showGameBtns(true);
  initGame();state='controls';controlsTimer=1.8;
  document.getElementById('btn-pause').textContent='⏸ Pause [P]';
}

function togglePause(){
  if(state==='playing'){
    state='paused';
    document.getElementById('btn-pause').textContent='▶ Resume [P]';
  } else if(state==='paused'){
    state='playing';
    document.getElementById('btn-pause').textContent='⏸ Pause [P]';
  }
}

function goHome(){
  state='menu';
  showGameBtns(false);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>Seawall Scramble</h1>
    <p>Navigate the Vancouver Seawall!</p>
    <p>Dodge goose poop 💚 and angry geese 🪿</p>
    <div class="start-wrap">
      <button class="bike-btn" onclick="startGame()">🚴 Play</button>
    </div>
    <p style="margin-top:10px;color:#7ec8e3;font-size:12px">Sky cycles morning → sunset → night → dawn as you play</p>`;
  ov.style.display='flex';
  document.getElementById('info-bar').style.display='none';
  document.getElementById('score-display').textContent='Score: 0';
  document.getElementById('tod-display').textContent='🌤 Morning';
}

function endGame(){
  state='gameover';showGameBtns(false);
  document.getElementById('info-bar').style.display='none';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1>GAME OVER</h1>
    <p style="color:#ff8866;font-size:17px;margin-top:6px">The geese win this time!</p>
    <p style="color:#ffe066;font-size:20px;margin-top:10px">Score: ${Math.floor(score)}</p>
    <p style="color:#aaddff;font-size:13px;margin-top:4px">Time survived: ${Math.floor(gameTime)}s — ${getSky().label}</p>
    <div class="start-wrap">
      <button class="bike-btn" onclick="startGame()">🚴 Play Again</button>
    </div>
    <button style="margin-top:10px;padding:6px 18px;font-family:monospace;background:#2a2a3a;color:#aaa;border:1px solid #666;cursor:pointer" onclick="goHome()">🏠 Main Menu</button>`;
}

// ── input ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  // Space = jump when playing, or resume when paused
  if(e.key===' '){
    e.preventDefault();
    if(state==='playing'&&player.jumpZ===0&&player.jumpVZ===0){
      if(player.hasSalmon){
        thrownSalmon={worldX:player.x+scrollX,y:player.y+8,timer:5.0};
        player.hasSalmon=false;playSound('throw_salmon');
      } else {
        player.jumpVZ=-165;playSound('jump');
      }
    } else if(state==='paused'){
      togglePause();
    }
  }
  if(e.key==='p'||e.key==='P'){
    if(state==='playing'||state==='paused') togglePause();
  }
  if(e.key==='Escape'){
    e.preventDefault();
    if(state==='playing'||state==='paused'||state==='controls') goHome();
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── boot ──────────────────────────────────────────────────────────────────────
lastTime=performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
